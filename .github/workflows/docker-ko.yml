name: Build and Publish Image

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      KO_DOCKER_REPO: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install ko
        uses: ko-build/setup-ko@v0.9

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ko base image (Alpine + ping)
        run: |
          docker build -f Dockerfile.ko-base -t "${KO_DOCKER_REPO}:ko-base" .
          docker push "${KO_DOCKER_REPO}:ko-base"

      - name: Build and push with short SHA tag
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          export KO_DEFAULTBASEIMAGE="${KO_DOCKER_REPO}:ko-base"
          ko build --bare --platform=linux/amd64,linux/arm64 --tags "${SHORT_SHA}" .
